metrics_to_run:
  - custom_response_quality
  - step_2_classification
  - micro_trajectory_adherence
  - dynamic_followup_adherence

custom_metrics:
  - name: custom_response_quality
    prompt_template: |
      You are an expert quality assurance evaluator for an enterprise AI assistant. Your task is to evaluate the agent's final response given the user prompt and the full agent trace (for tool-call and reasoning context).

      Please grade the response quality on a scale of 1 to 5 according to the following criteria, with strict attention to the output format matching the 'final_report_template.yaml':
      1 (Poor): The response fails to address the query, contains incorrect information, or completely ignores the required YAML format.
      2 (Below Average): The response partially addresses the query but has notable inaccuracies, gaps, or significant deviations from the YAML schema.
      3 (Acceptable): The response adequately answers the query but has minor formatting deviations or lacks depth.
      4 (Good): The response is accurate, well-structured, thoroughly covers the query, and mostly adheres to the required YAML schema.
      5 (Excellent): The response is highly relevant, comprehensive, flawlessly accurate, and perfectly adheres to the 'final_report_template.yaml' output schema.

      ### Target Evaluation:
      User Prompt: {prompt}
      Final Response: {response}
      Full Agent Trace: {agent_data}

      Return your evaluation as a valid JSON object matching this structure:
      {
        "score": <integer between 1 and 5>,
        "explanation": "<detailed string explaining the rationale for the score assigned>"
      }

  - name: step_2_classification
    prompt_template: |
      You are an expert evaluator grading the agent's Step 2 (Macro Legal Screen) performance.

      Based on the prompt and the agent_data trace, evaluate how accurately the agent classified the target location's macro status against the objectively correct reference.

      The deterministically correct classification is:
      {reference}

      Score out of 5:
      1 (Poor): The agent misclassified the location completely (e.g., passing a banned location as allowed, or rejecting a viable one), contradicting the reference.
      5 (Excellent): The agent correctly identified the macro classification, perfectly matching the provided reference.

      ### Target Evaluation:
      User Prompt: {prompt}
      Final Response: {response}
      Full Agent Trace: {agent_data}

      Return your evaluation as a valid JSON object matching this structure:
      {
        "score": <integer between 1 and 5>,
        "explanation": "<detailed string explaining the rationale for the score assigned>"
      }

  - name: micro_trajectory_adherence
    prompt_template: |
      You are an expert evaluator grading the agent's Step 3 (Deep Legal Verification) trajectory and accuracy.

      Review the 'agent_data' trace and evaluate the agent's actions based on the following rules:
      1. Did it actually use the 'fetch_page' tool to read zoning codes instead of just guessing from 'serper_search' snippets?
      2. Did it prioritize scraping official sources (.gov, municode.com, ecode360.com) over random blogs or generic travel sites?
      3. Did it correctly identify the specific restriction type, and does it match the ground truth reference?
      4. Did it avoid getting stuck in infinite scraping or search loops?

      The deterministically correct legal status and specific restriction is:
      {reference}

      Score out of 5:
      1 (Poor): The agent failed multiple rules (e.g., hallucinated laws, used unofficial sources, looped endlessly) AND/OR completely missed the specific restriction outlined in the reference.
      2 (Below Average): The agent used tools but relied on snippets, or it found a restriction but it significantly contradicts the reference.
      3 (Acceptable): The agent followed some trajectory rules and found a restriction that partially aligns with the reference.
      4 (Good): The agent mostly adhered to the trajectory rules and accurately identified the restriction matching the reference.
      5 (Excellent): The agent perfectly adhered to all trajectory rules (prioritizing official sources, reading full codes) and extracted the exact specific restriction matching the reference perfectly.

      ### Target Evaluation:
      User Prompt: {prompt}
      Final Response: {response}
      Full Agent Trace: {agent_data}

      Return your evaluation as a valid JSON object matching this structure:
      {
        "score": <integer between 1 and 5>,
        "explanation": "<detailed string explaining the rationale for the score assigned>"
      }

  - name: agent_turn_count
    custom_function: |
      def evaluate(instance):
          turns = (instance.get("agent_data") or {}).get("turns", [])
          return {'score': len(turns)}

  - name: dynamic_followup_adherence
    prompt_template: |
      You are an expert evaluator grading the agent's dynamic research loop performance.

      Your goal is to determine if the agent correctly realizes when it is missing crucial specific niche information (like unique stays rules) and proactively issues follow-up queries to discover it.

      Review the 'agent_data' trace and evaluate based on these criteria:
      1. Did the agent start by issuing generic queries without niche keywords (e.g., just searching for "short term rentals [city]" without mentioning yurts/RVs)?
      2. Did the agent's evaluator correctly reject the initial research as incomplete if it was missing required information (such as unique stays)?
      3. Did the agent then dynamically issue targeted follow-up queries (e.g., searching specifically for "unique stays", "yurts", "RVs", or "temporary structures")?

      Score out of 5:
      1 (Poor): The agent never attempted to search for missing niche info, or incorrectly approved an incomplete report that lacked unique stays details.
      2 (Below Average): The agent identified missing info but its follow-up queries were too broad or completely ineffective.
      3 (Acceptable): The agent realized information was missing and attempted follow-up queries, but they were not well-targeted for the specific missing info (e.g., unique stays).
      4 (Good): The agent correctly issued a targeted follow-up query for the missing information, but perhaps slightly deviated in its reasoning.
      5 (Excellent): The agent perfectly executed the dynamic loop: it ran a broad query, accurately identified what was missing (e.g. unique stays), and explicitly ran targeted follow-up queries using niche keywords.

      ### Target Evaluation:
      User Prompt: {prompt}
      Full Agent Trace: {agent_data}

      Return your evaluation as a valid JSON object matching this structure:
      {
        "score": <integer between 1 and 5>,
        "explanation": "<detailed string explaining the rationale for the score assigned>"
      }
