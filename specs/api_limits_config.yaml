# API Rate Limits Configuration
# This configuration enforces strict maximum call limits per user request/pipeline execution.
# If any of these limits are exceeded, the pipeline must immediately abort and fail the request
# to prevent runaway costs or rate limiting by external providers.

api_limits_per_request:
  google_maps_geocoding:
    max_calls: 20
    description: "Resolving user location inputs. Limit bounds the number of regions a user can query at once."

  overpass_api:
    max_calls: 20
    description: "Querying bounding boxes for municipalities. Corresponds to geocoding limits."

  serper_dev_search:
    max_calls: 50
    description: "Macro legal screen (1 per municipality) + Deep Legal Verification loop (max 3 per surviving municipality)."

  mashvisor_api:
    max_calls: 2
    description: "Market level financial pulls and subgroup lookups. Restricted to top surviving municipalities."

  llm_gemini_flash:
    max_calls: 50
    description: "Macro triage and final synthesis. High speed/low cost, but bounded to prevent runaway loops."

  llm_gemini_pro:
    max_calls: 20
    description: "Deep Legal Verification evaluation. Most expensive call, strictly limited to the small subset of surviving municipalities."

  web_scraper_fetch_page:
    max_calls: 30
    description: "Fetching full text of zoning codes during the Deep Legal Verification loop."
