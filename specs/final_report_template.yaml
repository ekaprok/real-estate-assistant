# Real Estate Assistant - Final STR Investment Report Template
# Defines the structure of the final report delivered to the user.
#
# Scope:
#   - Municipality (city/town) is the lowest geographic unit of analysis.
#   - The report showcases what works best in each municipality, not personalized ROI.

report_metadata:
  generated_at: "2026-06-24T12:00:00Z"

  user_inputs:
    target_locations: ["New Hampshire", "Poconos"]
    desired_home_types: ["Cabin", "Tiny Home"]

  data_sources:
    financial_data_source: "Mashvisor"
    legal_data_source:
      method: "Serper.dev web search + municipal / Municode / eCode360 / AmLegal scrape"
      # Exact, de-duplicated list of every link the legal findings were generated from,
      # aggregated across all municipalities in this report.
      source_urls:
        - "https://www.gatlinburgtn.gov/departments/finance/business_licenses.php"
        - "https://library.municode.com/tn/gatlinburg/codes/code_of_ordinances"

# Ranked list of all municipalities that survived legal, budget, and financial screening, sorted by recommendation
survived_municipalities:
  - rank: 1

    location:
      municipality: "Gatlinburg"
      state: "TN"
      county: "Sevier"  # Included when STR rules are county-governed or split across jurisdictions

    # Composite score (0–100) for municipal STR attractiveness
    municipal_str_score: 92
    # Weights used to compute the composite (must sum to 100)
    score_weights:
      cap_rate_yield: 30        # NOI / median property price
      legal_friendliness: 20    # ALLOWED > RESTRICTED; penalized for caps, min-stay, primary-residence rules

    # Step 3 Output: Deep Legal Verification
    legal_and_compliance:
      # MUST be ALLOWED or RESTRICTED or UNCLEAR to appear in the final report (BANNED municipalities are dropped)
      status: "RESTRICTED"
      restriction_reason: "STRs are only permitted in commercially zoned areas or designated tourist overlays."
      # Where inside the municipality STR is legal.
      eligible_zones_summary: "Tourist overlay districts and C-2 commercial zones; residential R-1 outside overlays is prohibited."
      primary_residence_required: false
      minimum_stay_days: 2
      permit_cap_exists: false
      permits:
        - name: "Tourist Accommodation Permit"
          process_summary: "Requires annual fire inspection and local business license."
          application_url: "https://www.gatlinburgtn.gov/departments/finance/business_licenses.php"
      special_taxes:
        - name: "Gross Receipts Tax"
          rate: "9.75%"
          description: "Combined state and local sales tax applied to gross rental income."
      # Less reliable. The chance STR rules get stricter or banned soon (the fields above describe today's rules).
      # Low/Medium/High + a short reason, based on proposed bans, recent rule changes, or local pushback
      # found in news and council minutes. It's a rough heads-up, so it only nudges the legal score, not a hard rule.
      regulatory_trajectory_risk: "Low risk. STRs are a primary economic driver for the city."
      summary_of_restrictions: "Highly favorable for STRs, provided the property is within the correct zoning overlay and passes fire inspection."
      # Exact links the legal findings for this municipality were generated from.
      source_urls:
        - "https://www.gatlinburgtn.gov/departments/finance/business_licenses.php"
        - "https://library.municode.com/tn/gatlinburg/codes/code_of_ordinances"

    # HOAs are private and cannot be verified by this system — a disclaimer only, not a data point.
    hoa_disclaimer: "Resort and planned communities in this market commonly carry HOAs whose CC&Rs may restrict STRs. This system verifies only government zoning/law — confirm HOA rules independently before closing."

    # Step 4 Output: Municipal Financial Metrics (Mashvisor city-level Lookup + Historical Performance)
    financial_metrics:
      # Mashvisor comp pool size for this municipality — higher = more reliable medians
      sample_size: 142
      data_quality: "high"  # high (≥80) | medium (≥30) | low (≥15) | very_low (<15)

      median_property_price: 450000
      average_daily_rate_adr: 285
      annual_occupancy_rate_percentage: 68
      annual_revenue_estimate: 70737  # Gross rental income (ADR × 365 × occupancy)
      annual_noi_estimate: 50931      # Gross revenue minus operating expenses
      average_cap_rate_percentage: 7.4  # Primary yield metric (no user-specific financing assumed)

      active_listings_count: 3450            # Competition density; gives the growth %s a base to interpret
      listings_growth_yoy_percentage: 2.1    # Supply trend — how fast new STRs are entering the market
      revenue_growth_yoy_percentage: 4.2     # Demand trend — revenue here outpaces supply, a healthy sign
      # Cash-flow risk (separate from saturation): concentrated income means long dead months to carry.
      seasonality_summary: "High — ~60% of revenue between June and October; weakest Nov–Feb."

      # Operating expenses from Mashvisor expenses_map (only categories the API returns)
      estimated_opex:
        total_annual: 19806
        total_percentage_of_revenue: 28
        breakdown:
          property_management: { annual: 10611, percentage_of_revenue: 15 }
          insurance: { annual: 2122, percentage_of_revenue: 3 }
          utilities: { annual: 3537, percentage_of_revenue: 5 }
          property_taxes: { annual: 3536, percentage_of_revenue: 5 }

    # Discovered from Mashvisor city-level subgroups (bed/bath/type) — not user preference
    optimal_property_configuration:
      property_type: "Cabin"
      bedrooms: 3
      bathrooms: 2.5
      accommodates: 8
      # high_impact_amenities: DEFERRED to Future work (AirDNA). Mashvisor lists per-listing
      # amenities but does not attribute ADR/occupancy lift, so this cannot be reliably produced.
      # high_impact_amenities: ["Hot Tub", "Mountain View", "Fire Pit"]

    # Web-search demand context for the market
    demand_drivers: ["Great Smoky Mountains NP gateway", "Ober Mountain ski area", "Dollywood"]

    # Step 5 Output: Final LLM Synthesis
    qualitative_synthesis: "Gatlinburg ranks first for 3-bedroom cabins at a 7.8% cap rate. STRs are viable in tourist overlay zones with low regulatory risk, subject to a tourist-accommodation permit and fire inspection."

# List of municipalities that were screened out due to STR bans.
banned_municipalities:
  - location:
      municipality: "New York"
      state: "NY"
    restriction_reason: "Local Law 18 strictly prohibits short-term rentals under 30 days unless the host is present."
    source_urls:
      - "https://www.nyc.gov/site/specialenforcement/registration-law/registration-law-for-hosts.page"

# Municipalities where legal verification could not be completed (API budget exhausted or research inconclusive).
undetermined_municipalities:
  - location:
      municipality: "Example City"
      state: "XX"
    reason: "Legal verification could not be completed: research/API budget exhausted"
